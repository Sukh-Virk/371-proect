<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 600" width="200" height="600" role="img" aria-label="decorative character">
  <rect width="100%" height="100%" fill="none" />
  <!-- Simple stylized character silhouette, high-contrast white on transparent -->
  <g fill="#ffffff">
    <!-- Head -->
    <circle cx="100" cy="70" r="36" />
    <!-- Hair/hat -->
    <path d="M60 44c10-12 60-18 80-12c-6 10-18 18-30 20c-20 4-40 2-50-8z" />
    <!-- Body -->
    <path d="M58 120c0 0-6 84 6 120c12 36 26 56 36 64c10 8 28 12 48 0c20-12 40-36 48-64c8-28 6-120 6-120H58z" />
    <!-- Buttons -->
    <circle cx="100" cy="200" r="6" />
    <circle cx="100" cy="240" r="6" />
    <circle cx="100" cy="280" r="6" />
    <!-- Arm / hand (simplified) -->
    <path d="M34 220c-2 6-6 18-2 28c6 14 10 16 18 18c6 2 12 0 14-6c2-6-2-12-6-18c-6-8-16-30-24-40z" />
    <!-- Feet (simplified) -->
    <rect x="70" y="360" width="20" height="10" rx="4" />
    <rect x="110" y="360" width="20" height="10" rx="4" />
  </g>
</svg>
